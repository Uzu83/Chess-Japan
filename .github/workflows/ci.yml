name: CI

on:
  # main だけだと、自動パイプライン/作業ブランチ(claude/**, auto/**)の push に CI が走らず
  # 「設定はあるが一度も実行されない」状態になる（実際にそうなっていた）。
  # 作業ブランチでも回るよう拡張。PR でも実行。
  push:
    branches: [main, 'claude/**', 'auto/**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        # JUnit XML の出力先 artifacts/test/junit.xml は scripts/build-review-packet.mjs が
        # 読む契約パス（artifacts/test/*.xml）に合わせている。ここを変えるとレビューパケットが
        # テスト結果を拾えなくなるので変更しない。
        # vitest 3.x の構文: reporter を複数指定し、--outputFile.junit=<path> で junit reporter
        # だけの出力先をドット記法で指定する（--outputFile 単体だと全 reporter に効いて
        # コンソール出力まで壊れる）。--reporter=default を残すのは CI ログで人間/AI が
        # 失敗テストを直接読めるようにするため。出力ディレクトリは vitest が自動作成する。
        run: npm run test -- --reporter=default --reporter=junit --outputFile.junit=artifacts/test/junit.xml

      - name: Upload test results (JUnit XML)
        # if: always() — テストが失敗した時こそ junit.xml が必要（失敗の内訳を
        # レビューパケット側で読むため）。成功時のみアップロードでは意味が半減する。
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test/junit.xml

      - name: Build
        run: npm run build

      - name: Audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true

  # Edge Function は Deno ランタイム。Node の typecheck/build では一切検査されない死角だったため、
  # ここで deno check で型安全を担保し、コスト防衛の心臓部(supabase/functions)も CI で守る。
  # 注: 整形は既存の Prettier(シングルクオート)に一本化する。deno fmt はダブルクオート規約で
  #     Prettier と衝突するため CI には入れない（フォーマッタ二重化を避ける＝必要十分）。
  #     deno lint も vitest 依存のテストファイルを拾って誤検知するため不採用。型検査だけ回す。
  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Deno type check (Edge Functions)
        # 単一ファイル固定だと新規 Edge Function を足しても型検査されない(CI-02)。全 index.ts を対象に。
        run: deno check supabase/functions/*/index.ts

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
